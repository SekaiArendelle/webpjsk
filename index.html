<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/title.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webpjsk</title>
  </head>
  <body>
    <div>
      <!-- id=app -->
      <div class="pjsk-container">
        <div class="category-bar">
          <div class="category-item">全部</div>
          <div class="category-item">其他</div>
        </div>

        <div class="song-grid">
          <!-- Song cards will be dynamically generated here -->
        </div>

        <div class="detail-panel">
          <div class="detail-left">
            <div class="difficulty-selector">
              <div class="difficulty-row">
                <span class="difficulty-label">Easy</span>
                <div class="difficulty-circle easy">
                  <input
                    type="radio"
                    name="difficulty"
                    id="easy"
                    value="easy"
                    checked
                  />
                  <label for="easy">5</label>
                </div>
              </div>
              <div class="difficulty-row">
                <span class="difficulty-label">Hard</span>
                <div class="difficulty-circle hard">
                  <input
                    type="radio"
                    name="difficulty"
                    id="hard"
                    value="hard"
                  />
                  <label for="hard">17</label>
                </div>
              </div>
              <div class="difficulty-row">
                <span class="difficulty-label">Expert</span>
                <div class="difficulty-circle expert">
                  <input
                    type="radio"
                    name="difficulty"
                    id="expert"
                    value="expert"
                  />
                  <label for="expert">24</label>
                </div>
              </div>
            </div>
            <div class="action-buttons">
              <button class="action-btn confirm">确定</button>
            </div>
          </div>

          <div class="detail-center">
            <h2 class="song-title">帝国少女</h2>
            <p class="song-artist">R Sound Design</p>
            <p class="song-vocal">Vo. 初音未来</p>
          </div>

          <div class="detail-right">
            <img
              class="detail-cover"
              src="https://picsum.photos/seed/pjsk1/300/200"
              alt="detail"
            />
          </div>
        </div>

        <div class="sidebar">
          <div class="sidebar-btn">🔍</div>
          <div class="sidebar-btn">⚙</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
